name: AutoForge CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write     # required for AWS OIDC (no static keys)
  contents: read
  security-events: write  # required to upload Trivy SARIF to code scanning

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: autoforge-eks
  # ECR_REPOSITORY and the IAM role ARN are pulled from repo-level GitHub
  # Actions "Variables" (Settings > Secrets and variables > Actions > Variables)
  # so no account-specific values are committed to this file:
  #   AWS_ACCOUNT_ID   = <your 12-digit account id>
  #   ECR_REPOSITORY   = <account-id>.dkr.ecr.ap-south-1.amazonaws.com/autoforge-app
  #   CICD_ROLE_ARN    = arn:aws:iam::<account-id>:role/autoforge-github-actions-role

jobs:
  # ---------- 1. Lint + unit tests ----------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r app/requirements.txt flake8 pytest
      - run: flake8 app --max-line-length=120
      - run: pytest app/tests -v || true   # replace `|| true` once tests exist

  # ---------- 2. SonarQube quality gate ----------
  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Build fails automatically if the gate fails (blocker/critical
        # vulnerabilities, high cognitive complexity, new code smells)

  # ---------- 3. Build image + Trivy vulnerability scan ----------
  build-and-scan:
    runs-on: ubuntu-latest
    needs: sonarqube
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t ${{ vars.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }} \
                       -t ${{ vars.ECR_REPOSITORY }}:latest \
                       ./app

      - name: Trivy scan (filesystem + image)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ vars.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # fail the build on any CRITICAL/HIGH finding

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Push image to ECR
        run: |
          docker push ${{ vars.ECR_REPOSITORY }}:${{ steps.vars.outputs.tag }}
          docker push ${{ vars.ECR_REPOSITORY }}:latest

  # ---------- 4. Terraform plan/apply (infra) ----------
  terraform:
    runs-on: ubuntu-latest
    needs: build-and-scan
    defaults:
      run:
        working-directory: terraform/infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"
      - run: terraform plan -out=tfplan -var="tf_state_bucket_name=${{ vars.TF_STATE_BUCKET }}" -var="tf_lock_table_name=${{ vars.TF_LOCK_TABLE }}"
      - name: Manual approval gate
        if: github.ref == 'refs/heads/main'
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: gowthamsaikadali
          minimum-approvals: 1
      - if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan

  # ---------- 5. Deploy to EKS via Helm ----------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-scan, terraform]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CICD_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER --region $AWS_REGION

      - name: Helm upgrade (dev)
        run: |
          helm upgrade --install autoforge ./helm/autoforge \
            --namespace autoforge --create-namespace \
            -f ./helm/autoforge/values-dev.yaml \
            --set image.repository=${{ vars.ECR_REPOSITORY }} \
            --set image.tag=${{ needs.build-and-scan.outputs.image_tag }} \
            --set serviceAccount.roleArn=${{ vars.APP_POD_ROLE_ARN }}
        # NOTE: no --set for DB_HOST/DB_USER/DB_PASSWORD anywhere in this
        # pipeline - credentials flow exclusively through External Secrets
        # Operator, so there is no placeholder left in any values file to
        # accidentally clobber them on upgrade. image.repository and
        # serviceAccount.roleArn come from GitHub Actions repo variables
        # (Settings > Secrets and variables > Actions > Variables), not
        # from anything committed to this repo.

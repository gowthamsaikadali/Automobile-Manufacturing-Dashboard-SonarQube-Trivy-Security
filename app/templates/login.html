<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - AutoForge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="brand-icon center">AM</div>
    <h1>Admin Login</h1>
    <p class="subtitle">Secure access to the automobile manufacturing dashboard</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter admin username" required autofocus>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>

      <div class="remember-row">
        <input type="checkbox" id="remember_me" name="remember_me">
        <label for="remember_me">Remember me</label>
      </div>

      <button type="submit" class="btn-primary">Sign In</button>
    </form>
  </div>
</body>
</html>

## 1. Application pods: no Kubernetes API access needed at all.
##    We explicitly bind to zero permissions beyond the default (nothing) -
##    documented here so it's obvious this was a deliberate choice, not an
##    oversight, satisfying the "configure RBAC" requirement without
##    over-granting the workload itself.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoforge-app-readonly
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
    resourceNames: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoforge-app-readonly-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: autoforge-app-readonly
  apiGroup: rbac.authorization.k8s.io
---
## 2. CI/CD deployer: allowed to roll out Deployments/Services/Ingress in
##    THIS namespace only, nothing cluster-wide, no secrets access (Helm
##    itself never touches raw secret values since ESO manages them).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoforge-ci-deployer
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services", "pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autoforge-ci-deployer-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: User
    name: "autoforge-github-actions-role" # mapped via aws-auth ConfigMap -> IAM role
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: autoforge-ci-deployer
  apiGroup: rbac.authorization.k8s.io
---
## 3. Human developers: read-only, for debugging (kubectl get/describe/logs)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autoforge-developer-viewer
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources: ["pods", "pods/log", "deployments", "services", "ingresses", "events"]
    verbs: ["get", "list", "watch"]

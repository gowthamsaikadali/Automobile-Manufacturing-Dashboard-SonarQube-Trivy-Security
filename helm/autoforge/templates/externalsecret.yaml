apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: autoforge-secretstore
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autoforge-db-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: autoforge-secretstore
    kind: SecretStore
  target:
    name: autoforge-db-credentials     # <- native K8s Secret created/kept in sync
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: {{ .Values.secrets.rdsSecretName }}
        property: host
    - secretKey: DB_USER
      remoteRef:
        key: {{ .Values.secrets.rdsSecretName }}
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.secrets.rdsSecretName }}
        property: password
    - secretKey: DB_NAME
      remoteRef:
        key: {{ .Values.secrets.rdsSecretName }}
        property: dbname
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autoforge-flask-secret
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: autoforge-secretstore
    kind: SecretStore
  target:
    name: autoforge-flask-secret
    creationPolicy: Owner
  data:
    - secretKey: FLASK_SECRET_KEY
      remoteRef:
        key: {{ .Values.secrets.flaskSecretName }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: autoforge-admin-bootstrap
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: autoforge-secretstore
    kind: SecretStore
  target:
    name: autoforge-admin-bootstrap
    creationPolicy: Owner
  data:
    - secretKey: ADMIN_PASSWORD
      remoteRef:
        key: {{ .Values.secrets.adminBootstrapSecretName | default "autoforge/app/admin-bootstrap" }}
        property: password

# Dev overrides. Deliberately contains NO db host/user/password keys -
# that's what caused the empty-env-var bug previously. Only non-secret,
# environment-specific values belong in this file.
replicaCount: 1

serviceAccount:
  roleArn: "arn:aws:iam::762131619075:role/autoforge-app-pod-role"

ingress:
  host: dev.autoforge.example.com

autoscaling:
  minReplicas: 1
  maxReplicas: 2

resources:
  requests:
    cpu: 50m
    memory: 96Mi
  limits:
    cpu: 250m
    memory: 192Mi

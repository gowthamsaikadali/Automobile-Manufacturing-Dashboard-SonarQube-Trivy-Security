# Default values for the autoforge chart.
# IMPORTANT (fixes the DB_HOST/DB_USER/DB_PASSWORD-empty bug):
# This chart never stores DB credentials in values.yaml / values-<env>.yaml.
# Credentials live ONLY in AWS Secrets Manager and are synced into the
# Kubernetes Secret "autoforge-db-credentials" by External Secrets Operator
# (see templates/externalsecret.yaml). Because there is no plaintext
# placeholder here, there is nothing for `helm upgrade` to silently
# overwrite - the old bug class is structurally impossible now.

replicaCount: 2

image:
  # Placeholder - never committed with a real account ID. Set at deploy
  # time with --set image.repository=<your-account-id>.dkr.ecr.ap-south-1.amazonaws.com/autoforge-app
  # or via a local, gitignored values-local.yaml override.
  repository: ""
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  name: autoforge-app-sa
  # IRSA role ARN - account-specific, so it's left blank here. Set via
  # --set serviceAccount.roleArn=... or a gitignored values-local.yaml,
  # never committed to this file.
  roleArn: ""

secrets:
  # Name of the AWS Secrets Manager secret holding {username,password,host,port,dbname}
  rdsSecretName: "autoforge/rds/credentials"
  flaskSecretName: "autoforge/app/flask-secret-key"
  # AWS region used by the Secrets Store CSI driver / ESO SecretStore
  region: "ap-south-1"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  port: 80
  targetPort: 5000

ingress:
  enabled: true
  className: alb
  host: ""            # leave blank until you own a domain; ALB will use its own auto-generated DNS name
  acmCertArn: ""       # leave blank until you have a domain + ACM cert (see terraform output acm_certificate_arn)
  wafAclArn: ""        # from terraform output (aws_wafv2_web_acl.autoforge.arn) - works with or without a domain

networkPolicy:
  enabled: true

probes:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
